services:
  gitlab:
    container_name: gitlab
    image: gitlab/gitlab-ce:${GITLAB_VERSION}
    restart: always
    hostname: gitlab

    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}

    ports:
      - '${GITLAB_HTTP_PORT}:14080'
      - '${GITLAB_SSH_PORT}:22'

    volumes:
      - '${GITLAB_HOME}/config:/etc/gitlab'
      - '${GITLAB_HOME}/logs:/var/log/gitlab'
      - '${GITLAB_HOME}/data:/var/opt/gitlab'

    shm_size: '${GITLAB_SHM_SIZE}'

  postgres-infra:
    container_name: postgres-infra
    image: postgres:${POSTGRES_INFRA_VERSION}
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_INFRA_USER}
      POSTGRES_PASSWORD: ${POSTGRES_INFRA_PASSWORD}
      POSTGRES_DB: ${POSTGRES_INFRA_DB}

      MATTERMOST_DB_NAME: ${MATTERMOST_DB_NAME}
      MATTERMOST_DB_USER: ${MATTERMOST_DB_USER}
      MATTERMOST_DB_PASSWORD: ${MATTERMOST_DB_PASSWORD}

    volumes:
      - '${POSTGRES_INFRA_HOME}/data:/var/lib/postgresql/data'
      - './postgres-infra-init:/docker-entrypoint-initdb.d:ro'

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INFRA_USER} -d ${POSTGRES_INFRA_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mattermost:
    container_name: mattermost
    image: mattermost/mattermost-team-edition:${MATTERMOST_VERSION}
    restart: always

    depends_on:
      postgres-infra:
        condition: service_healthy

    environment:
      MM_SERVICESETTINGS_SITEURL: ${MATTERMOST_EXTERNAL_URL}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://${MATTERMOST_DB_USER}:${MATTERMOST_DB_PASSWORD}@postgres-infra:5432/${MATTERMOST_DB_NAME}?sslmode=disable&connect_timeout=10"
      MM_FILESETTINGS_DIRECTORY: /mattermost/data

    ports:
      - '${MATTERMOST_HTTP_PORT}:8065'

    volumes:
      - '${MATTERMOST_HOME}/config:/mattermost/config'
      - '${MATTERMOST_HOME}/data:/mattermost/data'
      - '${MATTERMOST_HOME}/logs:/mattermost/logs'
      - '${MATTERMOST_HOME}/plugins:/mattermost/plugins'
      - '${MATTERMOST_HOME}/client/plugins:/mattermost/client/plugins'
      - '${MATTERMOST_HOME}/bleve-indexes:/mattermost/bleve-indexes'
